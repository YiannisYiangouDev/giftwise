name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Secret scanning (trufflehog)
        uses: trufflesecurity/trufflehog@main
        with: { path: '.', base: '${{ github.event.before }}', head: '${{ github.sha }}' }

  frontend:
    runs-on: ubuntu-latest
    needs: security-scan
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

  scraper:
    runs-on: ubuntu-latest
    needs: security-scan
    defaults: { run: { working-directory: scraper } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r requirements.txt
      - run: pip install safety && safety check --full-report || true
      - run: python -m pytest tests/ -v

  supabase-lint:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: latest }
      - run: supabase db lint --linked --project-ref pnmsysqljdnprcwkerlf || true
