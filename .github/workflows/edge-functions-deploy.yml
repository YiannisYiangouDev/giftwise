name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase functions deploy price-checker --project-ref $SUPABASE_PROJECT_REF
          supabase functions deploy birthday-reminder --project-ref $SUPABASE_PROJECT_REF
          supabase functions deploy weekly-digest --project-ref $SUPABASE_PROJECT_REF

      - name: Set Edge Function Secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase secrets set RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} --project-ref $SUPABASE_PROJECT_REF
          supabase secrets set APP_URL=${{ secrets.APP_URL }} --project-ref $SUPABASE_PROJECT_REF
